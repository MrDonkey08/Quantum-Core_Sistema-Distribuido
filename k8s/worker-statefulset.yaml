apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: worker
spec:
  replicas: 20
  selector:
    matchLabels:
      app: mandelbrot-worker
  template:
    metadata:
      labels:
        app: mandelbrot-worker
    spec:
      containers:
        - name: mandelbrot-worker
          image: quantum-core:latest
          imagePullPolicy: Never
          env:
            - name: ROLE
              value: "worker"
            - name: LISTEN_ADDR
              value: "0.0.0.0:8080"
            - name: COORDINATOR_ADDR
              # hardcoded WireGuard IP of coordinator's host
              value: "10.5.5.4:9000"
            - name: POD_IP
              valueFrom:
                fieldRef:
                  # Kubernetes Downward API — injects pod's own IP
                  fieldPath: status.podIP
